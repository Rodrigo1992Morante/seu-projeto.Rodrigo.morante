name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Verificar arquivos
        run: |
          echo "Verificando se index.html existe..."
          test -f site/index.html

      - name: Exibir conteúdo
        run: cat site/index.html
